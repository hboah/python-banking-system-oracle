{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">Create New Account</h2>
  
  <form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    
    <!-- Customer Info -->
    <h5 class="mb-3">Customer Information</h5>
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input type="text" name="first_name" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input type="text" name="last_name" class="form-control" required>
      </div>
    </div>
    
    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select" required>
          <option value="">-- Select --</option>
          <option value="M">Male</option>
          <option value="F">Female</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Date of Birth</label>
        <input type="date" name="date_of_birth" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">ID Type</label>
        <select name="id_type" class="form-select" required>
          <option value="">-- Select --</option>
          <option value="Passport">Passport</option>
          <option value="National ID">National ID</option>
          <option value="Driver’s License">Driver’s License</option>
        </select>
      </div>
    </div>
    
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">ID Number</label>
        <input type="text" name="id_number" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
    </div>
    
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Phone Number</label>
        <input type="text" name="phone_number" class="form-control" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control" required>
      </div>
    </div>
    
    <!-- Account Info -->
    <h5 class="mb-3">Account Information</h5>
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Branch</label>
        <select name="branch_id" class="form-select" required>
          <option value="">-- Select --</option>
          {% for b in branches %}
            <option value="{{ b.0 }}">{{ b.1 }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Account Type</label>
        <select name="account_type" class="form-select" required>
          <option value="">-- Select --</option>
          <option value="Savings">Savings</option>
          <option value="Current">Current</option>
          <option value="Fixed Deposit">Fixed Deposit</option>
        </select>
      </div>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Opening Balance (GHS)</label>
      <input type="number" name="opening_balance" class="form-control" min="0" step="0.01">
    </div>
    
    <button type="submit" class="btn btn-success">Create Account</button>
    <a href="{% url 'account_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
