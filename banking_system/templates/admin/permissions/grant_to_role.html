{% extends "admin/base_site.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<link href="{% static 'admin/css/vendor/select2/select2.css' %}" rel="stylesheet">

<!-- Load jQuery FIRST -->
<script src="{% static 'admin/js/vendor/jquery/jquery.min.js' %}"></script>
<script src="{% static 'admin/js/vendor/select2/select2.full.min.js' %}"></script>

<script>
(function($){
  $(function(){
    var $sel = $('#id_role.admin-autocomplete');
    $sel.select2({
      width: '100%',
      placeholder: "Select role...",
      allowClear: true,
      minimumInputLength: 0,
      ajax: {
        url: "{% url 'admin:banking_system_roles_autocomplete' %}",
        dataType: 'json',
        delay: 200,
        data: function(params){ return { term: params.term || '' }; },
        processResults: function(data){ return data; }
      }
    });

    // preload results when dropdown opens
    $sel.on('select2:opening', function(){
      if (!$sel.val()) {
        $.ajax({
          url: "{% url 'admin:banking_system_roles_autocomplete' %}",
          dataType: 'json',
          data: { term: '' },
          success: function(data){
            (data.results || []).forEach(function(it){
              if ($sel.find('option[value="'+it.id+'"]').length === 0) {
                $sel.append(new Option(it.text, it.id, false, false));
              }
            });
          }
        });
      }
    });
  });
})(jQuery);
</script>
{% endblock %}

{% block content %}
<div class="module aligned">
  <h2>Grant {{ permission.permission_name }} to a Role</h2>
  <form method="post">
    {% csrf_token %}
    <fieldset class="module">
      <div class="form-row">
        <label>Permission:</label>
        <strong>{{ permission.permission_name }}</strong>
      </div>
      <div class="form-row">
        <label for="id_role">Role:</label>
        <select name="role_id" id="id_role" class="admin-autocomplete" style="width:100%"></select>
      </div>
    </fieldset>

    <div class="submit-row">
      <input type="submit" value="Grant to Role" class="default">
      <a href="../" class="button cancel-link">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
